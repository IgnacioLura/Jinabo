services:
  postgres:
    image: postgres:16-alpine
    container_name: carlos-inventario-db
    restart: unless-stopped
    ports:
      - "5544:5432"
    environment:
      POSTGRES_USER: carlos
      POSTGRES_PASSWORD: carlos
      POSTGRES_DB: inventario
    volumes:
      - carlos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carlos -d inventario"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  carlos_pg_data:
